name: Deploy Broker to Azure Function App

on:
  push:
    branches:
      - master
      - main
      - azure-migration
    paths:
      - 'broker/**'
      - 'tracker/**'
      - '.github/workflows/azure-deploy.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: cb-webflow-broker
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './broker'
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repo'
        uses: actions/checkout@v4

      - name: 'Setup Node.js ${{ env.NODE_VERSION }}'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Install dependencies'
        run: |
          cd broker
          npm install --omit=dev
          cd ..

      - name: 'Copy tracker.js into broker package'
        run: |
          mkdir -p broker/tracker
          cp tracker/tracker.js broker/tracker/tracker.js

      - name: 'Deploy to Azure Function App'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
